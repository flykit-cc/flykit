name: Trigger flykit-web rebuild

# When the marketplace or any plugin changes, dispatch the flykit-web
# deploy workflow so flykit.cc rebuilds and shows the latest data.
#
# Requires a fine-grained PAT stored as FLYKIT_WEB_DEPLOY_PAT, scoped
# to flykit-cc/flykit-web with "Actions: Read and write".

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch flykit-web deploy
        env:
          GH_TOKEN: ${{ secrets.FLYKIT_WEB_DEPLOY_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "FLYKIT_WEB_DEPLOY_PAT secret not set — skipping"
            exit 0
          fi
          gh workflow run deploy.yml -R flykit-cc/flykit-web --ref main
          echo "Dispatched flykit-web deploy"
