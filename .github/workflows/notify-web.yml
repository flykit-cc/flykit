name: Notify flykit-web to rebuild

# When the marketplace or any plugin changes, ping the Vercel deploy hook
# so flykit.cc rebuilds and shows the latest plugin metadata + READMEs.

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/**'
      - 'plugins/**'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not set — skipping"
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK" && echo "Deploy hook triggered"
