name: PR check

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify web.json author matches PR author
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -e
          MAINTAINERS="kaiomp"
          if echo "$MAINTAINERS" | tr ' ' '\n' | grep -qx "$PR_AUTHOR"; then
            echo "PR author '$PR_AUTHOR' is a maintainer — skipping author check"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA"...HEAD -- 'plugins/*/web.json' || true)
          if [ -z "$changed" ]; then
            echo "No web.json changes in this PR — skipping author check"
            exit 0
          fi
          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            declared=$(jq -r '.author // empty' "$f")
            if [ -z "$declared" ]; then
              echo "::error file=$f::web.json is missing an 'author' field"
              fail=$((fail+1))
            elif [ "$declared" != "$PR_AUTHOR" ]; then
              echo "::error file=$f::web.json declares author '$declared' but this PR is opened by '$PR_AUTHOR'. Open the PR under the claimed account, or ask a maintainer to land it."
              fail=$((fail+1))
            else
              echo "ok: $f — author '$declared' matches PR author"
            fi
          done <<< "$changed"
          if [ "$fail" -gt 0 ]; then exit 1; fi

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate marketplace.json
        run: jq empty .claude-plugin/marketplace.json

      - name: Validate every plugin.json
        run: |
          set -e
          found=0
          while IFS= read -r f; do
            echo "checking $f"
            jq empty "$f"
            found=$((found+1))
          done < <(find plugins -name plugin.json)
          echo "Validated $found plugin manifest(s)"

      - name: Every plugin in marketplace.json has web.json
        run: |
          set -e
          missing=0
          while IFS= read -r name; do
            path="plugins/$name/web.json"
            if [ ! -f "$path" ]; then
              echo "::error file=.claude-plugin/marketplace.json::plugin '$name' is listed in marketplace.json but $path is missing. See CONTRIBUTING.md."
              missing=$((missing+1))
            else
              jq empty "$path"
              echo "ok: $path"
            fi
          done < <(jq -r '.plugins[].name' .claude-plugin/marketplace.json)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing plugin(s) missing web.json"
            exit 1
          fi

      - name: Syntax-check plugin scripts
        run: |
          set -e
          count=0
          while IFS= read -r f; do
            node --check "$f"
            count=$((count+1))
          done < <(find plugins -name '*.js' -not -path '*/node_modules/*')
          echo "Syntax-checked $count script(s)"

      - name: Run plugin tests
        run: |
          set -e
          ran=0
          for dir in plugins/*/; do
            if [ -f "$dir/package.json" ] && jq -e '.scripts.test' "$dir/package.json" > /dev/null; then
              echo "::group::tests for $dir"
              (cd "$dir" && npm install --no-audit --no-fund && npm test)
              echo "::endgroup::"
              ran=$((ran+1))
            fi
          done
          echo "Ran tests for $ran plugin(s)"
